<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agente OS - Hospedeiro de Vídeo Wayland</title>
  <style>
    body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
    video { max-width: 80%; border: 2px solid #4CAF50; border-radius: 8px; margin-top: 20px; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
    button:hover { background: #45a049; }
    #status { margin-top: 15px; color: #aaa; }
  </style>
</head>
<body>
  <h1>Hospedeiro de Vídeo (Wayland)</h1>
  <p>Como o Wayland bloqueia a captura silenciosa de tela, este navegador será usado como "câmera".</p>
  <button id="btn-start">Permitir Captura de Tela</button>
  <div id="status">Aguardando...</div>
  <video id="video" autoplay muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <script src="host.js"></script>
</body>
</html>
